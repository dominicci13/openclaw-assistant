# OpenClaw egress proxy — default-DENY domain allowlist.
# Every OpenClaw outbound request (Anthropic, Telegram, Brave, web_fetch) is
# routed here by proxy.enabled, and allowed ONLY if its destination domain is
# in allowlist.txt. Everything else is denied and logged.

http_port 3128

# No cache peers here, so disable the ICMP pinger (it needs NET_RAW, which we
# drop) to keep the log clean.
pinger_enable off

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
# Internal MCP sidecar (openclaw-gmail) listens on 8000. OpenClaw clears
# NO_PROXY when the proxy is active, so even gateway->sidecar traffic is forced
# through squid — and Proxyline tunnels it via CONNECT (MCP uses long-lived SSE
# streams). So 8000 must be in BOTH Safe_ports (port allowed at all) and
# SSL_ports (CONNECT to it allowed). The dstdomain allowlist still gates WHICH
# host: only openclaw-gmail is permitted on 8000.
acl Safe_ports port 8000
acl SSL_ports port 8000
# iCloud IMAP (M5 Phase B): the iCloud provider tunnels IMAPS to imap.mail.me.com
# via CONNECT (imaplib can't use an HTTP proxy itself, so the provider hand-rolls
# the CONNECT-then-TLS tunnel). 993 must be in BOTH Safe_ports and SSL_ports; the
# dstdomain allowlist still gates WHICH host (only imap.mail.me.com).
acl Safe_ports port 993
acl SSL_ports port 993
acl CONNECT method CONNECT

# The allowlist (one domain per line; a leading "." matches subdomains).
acl allowed dstdomain "/etc/squid/allowlist.txt"

# Block unsafe ports and CONNECT to anything but TLS.
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow ONLY allowlisted destinations (plain HTTP + HTTPS CONNECT tunnels).
http_access allow allowed
# Default-deny everything else.
http_access deny all

# Pure filter: no on-disk cache of fetched content.
cache deny all

# Egress audit: log every destination + allow/deny decision to a file.
# /var/log/squid is a host bind mount (instance/logs/squid), so the audit trail
# survives container restarts and is readable from the host:
#   tail instance/logs/squid/access.log
# Squid runs as the unprivileged `proxy` user and cannot write to the root-owned
# /dev/stdout — file logging is required, not optional.
# Keep 8 rotated generations; rotation is triggered manually during the weekly
# security audit (docker exec openclaw-proxy squid -k rotate).
logfile_rotate 8
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Don't advertise the proxy or leak the client.
via off
forwarded_for delete
httpd_suppress_version_string on
