# Thin forwarder. Send EVERY query to Docker's embedded resolver (127.0.0.11):
# on this egress-connected container it resolves Docker service names locally and
# forwards external names upstream, so the gateway gets both from one resolver.
no-resolv
no-hosts
server=127.0.0.11

# Listen on the network interfaces (so the gateway can reach us), but NOT loopback:
# 127.0.0.11:53 is the embedded resolver we forward TO, and binding lo would collide
# with it.
bind-interfaces
except-interface=lo

# Thin cache; we are a forwarder, not an authority.
cache-size=1000
# Do not invent answers; a failed upstream lookup must surface as a real failure.
no-negcache
