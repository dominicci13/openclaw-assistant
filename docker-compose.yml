# OpenClaw — hardened single-user gateway (Milestone 1).
# Deviations from upstream compose are deliberate:
#   - ZERO published ports (ClawJacked: localhost is not a trusted zone)
#   - bind loopback, not lan
#   - no docker.sock mount, not even commented out
#   - pinned image version (audit log tracks digest)
#   - cap_drop ALL, read-only rootfs, resource limits

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.6.8@sha256:9f55f0cb32b2925a983f40726440189b8f422ec61ae2a0fb0cf90403cf6d63d7
    container_name: openclaw-gateway
    networks:
      - openclaw-internal
    # Resolve through the DNS-only forwarder (name resolution without egress), with
    # Docker's embedded resolver as fallback so sidecar service-name lookups still
    # work if the forwarder is ever down (external browsing degrades, core stays up).
    dns:
      - 172.19.0.53
      - 127.0.0.11
    # proxy.enabled is fail-closed: the gateway must reach the egress proxy at
    # startup, so wait until squid is healthy before starting. The DNS forwarder is
    # on the resolve path too, so wait for it as well.
    depends_on:
      openclaw-proxy:
        condition: service_healthy
      openclaw-dns:
        condition: service_healthy
    # Load the same secrets file OpenClaw reads, as REAL container env vars at
    # startup. Bundled keyed web-search providers (e.g. tavily, which declares
    # envVars: ["TAVILY_API_KEY"]) detect their credential from process.env at
    # startup, so it must be a real env var, not only OpenClaw's self-loaded .env.
    env_file:
      - ./instance/config/.env
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      # Pin container-side paths so host paths can never leak into runtime
      # (upstream issue #77436)
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      TZ: America/Santo_Domingo
      # web_fetch with useTrustedEnvProxy reads the standard proxy env vars;
      # without them it falls back to local DNS pinning, which the internal
      # network (rightly) breaks.
      HTTP_PROXY: http://openclaw-proxy:3128
      HTTPS_PROXY: http://openclaw-proxy:3128
      # NOTE: OpenClaw CLEARS NO_PROXY when proxy.enabled is on (anti-SSRF), so
      # this list is effectively ignored at runtime. Gateway->sidecar traffic is
      # therefore forced through squid, and openclaw-gmail is allowlisted there.
      NO_PROXY: localhost,127.0.0.1,::1
      # Shared secret for bearer auth to the Gmail sidecar. Compose substitutes
      # it from the repo-root .env into the gateway's process env; OpenClaw then
      # resolves ${GMAIL_MCP_BEARER_TOKEN} in openclaw.json (mcp.servers.gmail
      # .headers.Authorization) and sends it on every MCP request.
      GMAIL_MCP_BEARER_TOKEN: ${GMAIL_MCP_BEARER_TOKEN}
      # Same, for the Drive sidecar (mcp.servers.drive.headers.Authorization).
      DRIVE_MCP_BEARER_TOKEN: ${DRIVE_MCP_BEARER_TOKEN}
      # Same, for the Calendar sidecar (mcp.servers.calendar.headers.Authorization).
      CALENDAR_MCP_BEARER_TOKEN: ${CALENDAR_MCP_BEARER_TOKEN}
      # Same, for the GitHub sidecar (mcp.servers.github.headers.Authorization).
      GITHUB_MCP_BEARER_TOKEN: ${GITHUB_MCP_BEARER_TOKEN}
      # Relay token for the browser CDP endpoint. OpenClaw resolves
      # ${BROWSER_CDP_AUTH_TOKEN} inside openclaw.json (browser.profiles.relay.cdpUrl
      # userinfo) and sends it as HTTP Basic to the relay on each CDP request.
      BROWSER_CDP_AUTH_TOKEN: ${BROWSER_CDP_AUTH_TOKEN}
      # OpenAI key for inbound voice transcription (STT). OpenClaw's media preflight
      # reads OPENAI_API_KEY from the env; egress to api.openai.com goes via squid.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./instance/config:/home/node/.openclaw
      - ./instance/workspace:/home/node/.openclaw/workspace
      - ./instance/secrets:/home/node/.config/openclaw
    # No ports: section. Telegram long-polls outbound; nothing dials in.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 2g
    cpus: 2
    init: true
    restart: unless-stopped
    command:
      ["node", "dist/index.js", "gateway", "--bind", "loopback", "--port", "18789"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.6.8@sha256:9f55f0cb32b2925a983f40726440189b8f422ec61ae2a0fb0cf90403cf6d63d7
    # Admin-only service: the profile keeps `docker compose up -d` from starting
    # it as a permanently-running container. `docker compose run --rm openclaw-cli`
    # still works — run targets the named service regardless of profile.
    profiles: ["admin"]
    # Shares the gateway's network namespace — this is how admin works with
    # zero published ports: the CLI is "inside" with the gateway.
    network_mode: "service:openclaw-gateway"
    # Same secrets the gateway loads, so the CLI resolves ${OPENCLAW_GATEWAY_TOKEN}
    # in openclaw.json and authenticates as a TRUSTED OPERATOR (shared-secret auth =
    # full operator scope incl. admin). Without it the CLI connects as an unpaired
    # read-only device and admin mutations (cron create/edit/remove) are gated.
    # Safe here: the CLI is ephemeral, operator-run, same image/trust as the gateway
    # (unlike the always-on sidecar, where we deliberately withheld the bundle).
    env_file:
      - ./instance/config/.env
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      BROWSER: echo
      TZ: America/Santo_Domingo
      # Resolve the sidecar bearer refs too, so config loads without the noisy
      # "missing env var" warning (cosmetic for the CLI; it never calls a sidecar).
      GMAIL_MCP_BEARER_TOKEN: ${GMAIL_MCP_BEARER_TOKEN}
      DRIVE_MCP_BEARER_TOKEN: ${DRIVE_MCP_BEARER_TOKEN}
      BROWSER_CDP_AUTH_TOKEN: ${BROWSER_CDP_AUTH_TOKEN}
    volumes:
      - ./instance/config:/home/node/.openclaw
      - ./instance/workspace:/home/node/.openclaw/workspace
      - ./instance/secrets:/home/node/.config/openclaw
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    init: true
    stdin_open: true
    tty: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  openclaw-proxy:
    # Squid 6.13, pinned by digest. Default-DENY egress allowlist — every
    # OpenClaw outbound request is routed here (step 4) and allowed only if its
    # destination domain is in proxy/allowlist.txt.
    image: ubuntu/squid@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    container_name: openclaw-proxy
    networks:
      - openclaw-internal
      - openclaw-egress
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
      # Writable tmpfs dirs for squid's runtime/log/cache. mode 1777 so the
      # unprivileged `proxy` user (squid setuid's to it) can write — a plain
      # tmpfs mount is root-owned and would block it.
      - type: tmpfs
        target: /var/run
        tmpfs: { mode: 0o1777 }
      # Egress audit log on the HOST (mode-1777 dir, same proxy-user write
      # reason as the tmpfs mounts) — the audit trail must survive restarts.
      - ./instance/logs/squid:/var/log/squid
      - type: tmpfs
        target: /var/spool/squid
        tmpfs: { mode: 0o1777 }
      - type: tmpfs
        target: /tmp
        tmpfs: { mode: 0o1777 }
    # No published ports: only containers on openclaw-net can reach the proxy.
    # Image starts as root then squid setuid's to the proxy user — so drop ALL
    # caps but re-add only what that privilege-drop + dir setup needs.
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 512m
    cpus: 1
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  openclaw-gmail:
    # Self-built Gmail MCP sidecar (mcp-gmail/). Read + draft only; the OAuth
    # token it holds (readonly + compose scopes) physically cannot send/delete.
    # Same hardening posture as the proxy: locked box, one job.
    build: ./mcp-mail
    image: openclaw-gmail:0.1
    container_name: openclaw-gmail
    networks:
      - openclaw-internal
    # Reaches Google ONLY through squid â same fail-closed chokepoint as the
    # gateway. No direct egress.
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      GMAIL_SECRETS_DIR: /secrets
      OUTLOOK_SECRETS_DIR: /secrets-outlook
      # Per-send consent gate (M7): TOTP secret, model never sees it. Single
      # source = repo-root .env. The sidecar verifies a fresh code before send.
      SEND_TOTP_SECRET: ${SEND_TOTP_SECRET}
      # The user's own addresses (comma-separated). A send addressed ONLY to these
      # skips the TOTP (self-sends can't exfiltrate/impersonate). Any external
      # recipient still requires the code. Model can't edit this list.
      OWN_EMAIL_ADDRESSES: ${OWN_EMAIL_ADDRESSES}
      ICLOUD_SECRETS_DIR: /secrets-icloud
      # Claw's own send-only Gmail identity (claw.brian.ai@gmail.com), gmail.send scope.
      CLAW_SECRETS_DIR: /secrets-claw
      HTTP_PROXY: http://openclaw-proxy:3128
      HTTPS_PROXY: http://openclaw-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1
      # Shared secret for bearer auth on the MCP endpoint. Substituted by compose
      # from the repo-root .env. This is the ONLY new var the sidecar learns;
      # least-privilege intact (it still never sees the gateway's secret bundle).
      GMAIL_MCP_BEARER_TOKEN: ${GMAIL_MCP_BEARER_TOKEN}
    volumes:
      # The token + client secret, read-only. This is the ONLY container that
      # ever sees Gmail credentials â never the gateway.
      - ./instance/gmail:/secrets:ro
      # Outlook (Graph) creds - separate read-only mount (M5). Same isolation as
      # Gmail's: only this sidecar ever sees them, never the gateway.
      - ./instance/outlook:/secrets-outlook:ro
      # iCloud (IMAP) creds - app-specific password, separate read-only mount (M5 B).
      - ./instance/icloud:/secrets-icloud:ro
      # Claw's own send-only Gmail token (gmail.send), separate read-only mount.
      - ./instance/clawmail:/secrets-claw:ro
    # No published ports: only the gateway (same internal net) can reach it.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # openpyxl spools to a temp file when building .xlsx attachments (send_mail
      # excel_attachments); the read-only rootfs needs a writable in-memory /tmp.
      - /tmp
    mem_limit: 512m
    cpus: 1
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-proxy:
        condition: service_healthy

  openclaw-drive:
    # Self-built Drive MCP sidecar (mcp-drive/). Read + create only (no delete, no
    # overwrite). SEPARATE from the mail sidecar: holds only its own OneDrive OAuth
    # token, never mail creds. Same hardening posture; egress only via squid.
    build: ./mcp-drive
    image: openclaw-drive:0.1
    container_name: openclaw-drive
    networks:
      - openclaw-internal
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      ONEDRIVE_SECRETS_DIR: /secrets-onedrive
      HTTP_PROXY: http://openclaw-proxy:3128
      HTTPS_PROXY: http://openclaw-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1
      # Bearer auth for the gateway->drive MCP endpoint (root .env single source).
      DRIVE_MCP_BEARER_TOKEN: ${DRIVE_MCP_BEARER_TOKEN}
    volumes:
      # OneDrive (Graph Files) token, read-only. Only this container ever sees it.
      - ./instance/onedrive:/secrets-onedrive:ro
      # Google Drive token (separate Google OAuth client), read-only. Isolated
      # from OneDrive's creds and from the mail sidecar entirely.
      - ./instance/gdrive:/secrets-gdrive:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # openpyxl/python-docx spool to a temp file while building Office files;
      # the read-only rootfs needs a writable in-memory /tmp for that.
      - /tmp
    mem_limit: 512m
    cpus: 1
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-proxy:
        condition: service_healthy

  openclaw-calendar:
    # Self-built Calendar MCP sidecar (mcp-calendar/). Read + create + update only
    # (NO delete, no external invites). SEPARATE from mail + drive: holds only its
    # own per-calendar OAuth tokens, never mail/drive creds. Same hardening posture;
    # egress only via squid.
    build: ./mcp-calendar
    image: openclaw-calendar:0.1
    container_name: openclaw-calendar
    networks:
      - openclaw-internal
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      GCAL_SECRETS_DIR: /secrets-gcal
      CALENDAR_DEFAULT_TZ: America/Santo_Domingo
      HTTP_PROXY: http://openclaw-proxy:3128
      HTTPS_PROXY: http://openclaw-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1
      # Bearer auth for the gateway->calendar MCP endpoint (root .env single source).
      CALENDAR_MCP_BEARER_TOKEN: ${CALENDAR_MCP_BEARER_TOKEN}
    volumes:
      # Google Calendar token (its own OAuth client), read-only. Isolated from the
      # mail + drive sidecars entirely.
      - ./instance/gcal:/secrets-gcal:ro
      # Outlook/Graph Calendar token (its own Azure app, separate from Outlook mail),
      # read-only.
      - ./instance/mscal:/secrets-mscal:ro
      # iCloud Calendar (CalDAV) app-specific password, read-only. Separate from the
      # iCloud MAIL app password (independent revocation; same blast radius is inherent
      # to iCloud app passwords being all-or-nothing).
      - ./instance/icloudcal:/secrets-icloudcal:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-proxy:
        condition: service_healthy

  openclaw-github:
    # Self-built GitHub MCP sidecar (mcp-github/). READ-ONLY: list/get repos,
    # list/read files, search code. No tool can write/push/delete, and the
    # fine-grained PAT it holds is itself scoped (on GitHub) to read-only on a
    # limited set of repos. SEPARATE from mail/drive/calendar: holds only its own
    # GitHub PAT, never any other credential. Same hardening; egress only via squid.
    build: ./mcp-github
    image: openclaw-github:0.1
    container_name: openclaw-github
    networks:
      - openclaw-internal
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      GITHUB_SECRETS_DIR: /secrets-github
      HTTP_PROXY: http://openclaw-proxy:3128
      HTTPS_PROXY: http://openclaw-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1
      # Bearer auth for the gateway->github MCP endpoint (root .env single source).
      GITHUB_MCP_BEARER_TOKEN: ${GITHUB_MCP_BEARER_TOKEN}
    volumes:
      # The GitHub PAT, read-only. Only this container ever sees it (never the
      # gateway). A file, not an env var, so it stays out of `docker inspect`.
      - ./instance/github:/secrets-github:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-proxy:
        condition: service_healthy

  openclaw-browser:
    # Hardened headless-Chromium CDP sidecar (browser/). Renders JS pages and
    # automates PUBLIC sites only - NO credentials, NO secret mounts. Chromium
    # binds loopback; a token + source-range relay is the only thing on the
    # network, and ALL page egress is forced through squid (--proxy-server in the
    # entrypoint). Heaviest attack surface in the project -> treated as untrusted,
    # contained by the internal net + relay auth + hardened container. Joins the
    # weekly audit. The gateway reaches it by service name; the relay rewrites the
    # forwarded Host header to loopback so Chrome's DNS-rebinding guard accepts it.
    build: ./browser
    image: openclaw-browser:0.1
    container_name: openclaw-browser
    networks:
      - openclaw-internal
    environment:
      # Relay auth (root .env single source); the gateway sends the matching token
      # as cdpUrl userinfo -> HTTP Basic. Missing token = fail-closed (won't start).
      OPENCLAW_BROWSER_CDP_AUTH_TOKEN: ${BROWSER_CDP_AUTH_TOKEN}
      # Optional extra layer: restrict which source IPs the relay accepts. Empty by
      # default - internal:true net + zero published ports + the token are the
      # gates. Set a CIDR (once a subnet is pinned) to tighten further.
      OPENCLAW_BROWSER_CDP_SOURCE_RANGE: ${BROWSER_CDP_SOURCE_RANGE:-}
      # Chromium routes every page fetch through squid (our egress chokepoint).
      BROWSER_PROXY_URL: http://openclaw-proxy:3128
    # NO volumes: this sidecar holds no credentials at all.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 1g
    cpus: 1
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-proxy:
        condition: service_healthy

  openclaw-dns:
    # DNS-only forwarder (dns/). The gateway is internal:true with no external DNS,
    # but OpenClaw's browser navigation guard resolves the target hostname in the
    # gateway process. This gives the gateway name resolution WITHOUT egress: it
    # forwards to Docker's embedded resolver (127.0.0.11), which resolves internal
    # service names and - because this container is also on egress - external names.
    # The gateway still ROUTES only through squid. Static IP so the gateway's
    # resolv.conf can point at it. Navigation is allowlist-gated BEFORE the resolve,
    # so the gateway only ever resolves allowlisted domains. Holds NO credentials.
    build: ./dns
    image: openclaw-dns:0.1
    container_name: openclaw-dns
    networks:
      openclaw-internal:
        ipv4_address: 172.19.0.53
      openclaw-egress:
    cap_drop:
      - ALL
    cap_add:
      # NET_BIND_SERVICE: bind privileged port 53. SETUID/SETGID: dnsmasq starts as
      # root to bind, then drops to its own unprivileged user (fails closed without).
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
    mem_limit: 128m
    cpus: 0.5
    init: true
    restart: unless-stopped
    healthcheck:
      # Prove the forwarder actually resolves a service name through itself.
      test: ["CMD", "host", "-W", "2", "openclaw-proxy", "172.19.0.53"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  # Gateway lives ONLY here. internal: true = Docker attaches no route to the
  # outside world. Two dual-homed bridges cross to the internet: openclaw-proxy
  # (ALL HTTP egress, audited+allowlisted) and openclaw-dns (DNS resolution ONLY,
  # so the gateway can resolve hostnames for the browser SSRF pin without gaining
  # egress). Subnet is PINNED so openclaw-dns can hold a static resolver IP.
  openclaw-internal:
    internal: true
    ipam:
      config:
        - subnet: 172.19.0.0/16
  # Internet-facing side. Proxy + DNS forwarder only.
  openclaw-egress: